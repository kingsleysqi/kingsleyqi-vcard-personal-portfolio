<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KINGSLEY QI</title>
  <link rel="shortcut icon" href="./assets/images/favicon.svg" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .loading-tip {
      text-align: center;
      padding: 50px;
      color: #ffdb70;
      font-size: 16px;
    }
    
    /* 侧边栏样式 */
    .sidebar {
      transition: all 0.3s ease;
    }
    .sidebar.active .sidebar-info_more {
      opacity: 1 !important;
      visibility: visible !important;
    }
    .sidebar-info_more {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .info_more-btn {
      cursor: pointer;
      background: transparent;
      border: 1px solid rgba(255,219,112,0.3);
      padding: 6px 14px;
      border-radius: 20px;
      color: #ffdb70;
      font-size: 12px;
      transition: all 0.3s ease;
    }
    .info_more-btn:hover {
      background: rgba(255,219,112,0.1);
    }
    
    /* 引言卡片样式 */
    .hero-quote {
      margin-bottom: 35px;
    }
    .quote-box {
      background: rgba(255,219,112,0.05);
      border: 1px solid rgba(255,219,112,0.2);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
    }
    .quote-en {
      font-size: 16px;
      color: #ffdb70;
      font-style: italic;
      margin: 6px 0;
    }
    .quote-zh {
      font-size: 14px;
      color: #aaa;
      font-style: italic;
      margin: 6px 0;
    }
    
    /* About 文本样式 */
    .about-text {
      color: #ccc;
      font-size: 15px;
      line-height: 1.8;
    }
    .about-text p {
      margin-bottom: 16px;
    }
    .about-text strong {
      color: #ffdb70;
      font-weight: 600;
    }
    .about-text h1 {
      font-size: 24px;
      color: #ffdb70;
      margin: 28px 0 16px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(255,219,112,0.3);
    }
    .about-text h2 {
      font-size: 20px;
      color: #ffdb70;
      margin: 24px 0 12px 0;
    }
    .about-text h3 {
      font-size: 18px;
      color: #ddd;
      margin: 20px 0 10px 0;
    }
    .about-text ul, .about-text ol {
      margin: 12px 0 16px 28px;
    }
    .about-text li {
      margin: 8px 0;
      line-height: 1.7;
    }
    
    /* 修复标题行布局 */
    .title-wrapper {
      display: flex !important;
      align-items: center !important;
      gap: 12px !important;
      margin-bottom: 20px !important;
    }
    .title-wrapper .icon-box {
      margin: 0 !important;
      flex-shrink: 0 !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
    }
    .title-wrapper h3 {
      margin: 0 !important;
      line-height: 1 !important;
    }
    .timeline-list {
      margin-left: 45px !important;
    }
    
    /* PDF 按钮样式 */
    .pdf-button-wrapper {
      margin-top: 40px;
      text-align: center;
    }
    .export-pdf-btn {
      display: inline-flex !important;
      align-items: center !important;
      gap: 8px !important;
      background: #2a2a2a !important;
      border: 1px solid #ffdb70 !important;
      border-radius: 30px !important;
      color: #ffdb70 !important;
      cursor: pointer !important;
      font-size: 14px !important;
      padding: 10px 24px !important;
      transition: all 0.3s ease !important;
    }
    .export-pdf-btn:hover {
      background: #ffdb70 !important;
      color: #1a1a1a !important;
    }
    
    /* 手机端样式 */
    @media (max-width: 767px) {
      .navbar {
        position: fixed !important;
        bottom: 0 !important;
        top: auto !important;
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        background: rgba(20, 20, 25, 0.95) !important;
        backdrop-filter: blur(10px) !important;
        border-radius: 16px 16px 0 0 !important;
        padding: 8px 12px !important;
        z-index: 1000 !important;
        border-top: 1px solid rgba(255,219,112,0.2) !important;
      }
      .navbar-list {
        display: flex !important;
        justify-content: space-around !important;
        gap: 0 !important;
      }
      .navbar-link {
        font-size: 12px !important;
        padding: 6px 8px !important;
      }
      .main-content {
        margin-bottom: 70px !important;
      }
      .sidebar {
        margin-top: 15px !important;
      }
    }
    
    /* 电脑端样式 - 半透明毛玻璃菜单，不遮挡内容 */
    @media (min-width: 768px) {
      .navbar {
        position: fixed !important;
        top: 20px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        width: auto !important;
        background: rgba(25, 25, 30, 0.85) !important;
        backdrop-filter: blur(12px) !important;
        border-radius: 50px !important;
        padding: 6px 20px !important;
        z-index: 1000 !important;
        border: 1px solid rgba(255,219,112,0.25) !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
      }
      .navbar-list {
        display: flex !important;
        gap: 20px !important;
      }
      .navbar-link {
        font-size: 13px !important;
        padding: 8px 16px !important;
        border-radius: 30px !important;
        transition: all 0.2s ease !important;
      }
      .navbar-link.active {
        background: rgba(255,219,112,0.2) !important;
      }
      .navbar-link:hover {
        background: rgba(255,219,112,0.1) !important;
      }
      .main-content {
        margin-top: 100px !important;
      }
      .sidebar {
        margin-top: 100px !important;
      }
    }
    
    .icon-box ion-icon {
      font-size: 18px;
      color: #ffdb70;
    }
    .social-link ion-icon {
      font-size: 18px;
      color: #888;
    }
    .social-link:hover ion-icon {
      color: #ffdb70;
    }
  </style>
</head>
<body>
  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/01.png" alt="Kingsley Qi" width="80">
        </figure>
        <div class="info-content">
          <h1 class="name">Kingsley Qi</h1>
          <p class="title">工业自动化 × IT基础设施 × 系统解决方案</p>
          <p class="title">Industrial Automation × IT Infrastructure × System Solutions</p>
        </div>
        <button class="info_more-btn" data-sidebar-btn>
          <span>展开联系方式</span>
          <ion-icon name="chevron-down"></ion-icon>
        </button>
      </div>

      <div class="sidebar-info_more">
        <div class="separator"></div>
        <ul class="contacts-list">
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="mail-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Email</p>
              <a href="mailto:i@kingsleyqi.com" class="contact-link">i@kingsleyqi.com</a>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="phone-portrait-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Phone</p>
              <a href="tel:+63960864508" class="contact-link">+63 960864508*</a>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="calendar-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Birthday</p>
              <time datetime="1992-08-29">Aug 29, 1992</time>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="location-outline"></ion-icon></div>
            <div class="contact-info">
              <p class="contact-title">Location</p>
              <address>Batangas, Philippines</address>
            </div>
          </li>
        </ul>
        <div class="separator"></div>
        <ul class="social-list">
          <li class="social-item"><a href="./assets/images/wechat-kq.png" class="social-link"><ion-icon src="./assets/images/wechat.svg"></ion-icon></a></li>
          <li class="social-item"><a href="https://www.facebook.com/share/17jWndEeLo/" class="social-link"><ion-icon name="logo-facebook"></ion-icon></a></li>
          <li class="social-item"><a href="https://x.com/QiKingsley" class="social-link"><ion-icon name="logo-twitter"></ion-icon></a></li>
          <li class="social-item"><a href="https://www.instagram.com/kingsley_qi" class="social-link"><ion-icon name="logo-instagram"></ion-icon></a></li>
        </ul>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><button class="navbar-link active" data-nav-link="about">About</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="path">Path</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="network">Network</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="systems">Systems</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="contact">Contact</button></li>
        </ul>
      </nav>

      <article class="about active" data-page="about" id="about-container"><div class="loading-tip">加载中...</div></article>
      <article class="Path" data-page="path" id="path-container"><div class="loading-tip">加载中...</div></article>
      <article class="network" data-page="network" id="network-container"><div class="loading-tip">加载中...</div></article>
      <article class="Systems" data-page="systems" id="systems-container"><div class="loading-tip">加载中...</div></article>
      <article class="contact" data-page="contact" id="contact-container"><div class="loading-tip">加载中...</div></article>
    </div>
  </main>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <script>
    // 侧边栏折叠
    (function() {
      const sidebarBtn = document.querySelector("[data-sidebar-btn]");
      const sidebar = document.querySelector("[data-sidebar]");
      if (sidebarBtn && sidebar) {
        sidebarBtn.addEventListener("click", function(e) {
          e.stopPropagation();
          sidebar.classList.toggle("active");
          const span = this.querySelector('span');
          if (sidebar.classList.contains('active')) {
            span.textContent = '收起联系方式';
          } else {
            span.textContent = '展开联系方式';
          }
        });
      }
    })();
  </script>
  <script src="./assets/js/script.js"></script>
</body>
</html>
