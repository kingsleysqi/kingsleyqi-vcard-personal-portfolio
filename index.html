  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script>
    // 侧边栏折叠（增强版）
    function initSidebar() {
      const sidebar = document.querySelector("[data-sidebar]");
      const sidebarBtn = document.querySelector("[data-sidebar-btn]");
      if (sidebarBtn && sidebar) {
        const newBtn = sidebarBtn.cloneNode(true);
        sidebarBtn.parentNode.replaceChild(newBtn, sidebarBtn);
        newBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          sidebar.classList.toggle("active");
          const span = this.querySelector('span');
          if (span) {
            span.textContent = sidebar.classList.contains('active') ? 'Hide Contacts' : 'Show Contacts';
          }
        });
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initSidebar);
    } else {
      initSidebar();
    }
    setTimeout(initSidebar, 500);

    // 动态加载库，优先本地，回退 CDN
    function loadScript(src, fallbackSrc) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = () => {
          if (fallbackSrc) {
            const fallbackScript = document.createElement('script');
            fallbackScript.src = fallbackSrc;
            fallbackScript.onload = resolve;
            fallbackScript.onerror = reject;
            document.head.appendChild(fallbackScript);
          } else {
            reject();
          }
        };
        document.head.appendChild(script);
      });
    }

    Promise.all([
      loadScript('./assets/js/marked.min.js', 'https://cdn.jsdelivr.net/npm/marked/marked.min.js'),
      loadScript('./assets/js/html2pdf.bundle.min.js', 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js')
    ]).then(() => {
      const script = document.createElement('script');
      script.src = './assets/js/script.js';
      document.body.appendChild(script);
    }).catch(err => {
      console.error('库加载失败', err);
      document.querySelectorAll('.loading-tip').forEach(el => {
        el.innerHTML = '⚠️ 关键资源加载失败，请刷新页面重试<br><small>如持续失败，请检查网络连接</small>';
        el.style.color = '#ff6b6b';
      });
    });
  </script>
</body>
</html>
