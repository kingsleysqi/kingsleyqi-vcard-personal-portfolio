<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KINGSLEY QI | 工业自动化 × IT

Industrial Automation × IT</title>
  <link rel="shortcut icon" href="./assets/images/01.png" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- 使用国内 CDN 加速 marked.js -->
  <script>
    // 优先使用国内 CDN
    const loadScript = (src, fallback) => {
      const script = document.createElement('script');
      script.src = src;
      script.onerror = () => {
        if (fallback) {
          const fallbackScript = document.createElement('script');
          fallbackScript.src = fallback;
          document.head.appendChild(fallbackScript);
        }
      };
      document.head.appendChild(script);
    };
    
    // 加载 marked.js - 多 CDN 备用
    loadScript('https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js', 
               'https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js');
    // 加载 html2pdf
    loadScript('https://cdn.bootcdn.net/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js',
               'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js');
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .loading-tip {
      text-align: center;
      padding: 50px;
      color: #ffdb70;
      font-size: 16px;
    }
    
    /* 侧边栏文字换行修复 */
    .sidebar-info {
      display: flex !important;
      gap: 12px !important;
      align-items: flex-start !important;
      flex-wrap: wrap !important;
    }
    .avatar-box {
      flex-shrink: 0 !important;
    }
    .info-content {
      flex: 1 !important;
      min-width: 0 !important;
    }
    .info-content .title {
      white-space: normal !important;
      word-break: break-word !important;
      line-height: 1.4 !important;
      width: auto !important;
      max-width: 100% !important;
      font-size: 11px !important;
    }
    
    /* 电脑端菜单栏优化 - 更小更紧凑 */
    @media (min-width: 768px) {
      .navbar {
        top: 12px !important;
        padding: 4px 16px !important;
        min-width: auto !important;
        background: rgba(25, 25, 30, 0.92) !important;
      }
      .navbar-list {
        gap: 4px !important;
      }
      .navbar-link {
        font-size: 12px !important;
        padding: 5px 12px !important;
      }
      .main-content {
        margin-top: 70px !important;
      }
      .sidebar {
        margin-top: 70px !important;
      }
    }
    
    /* 手机端菜单栏优化 */
    @media (max-width: 767px) {
      .navbar {
        padding: 6px 8px !important;
      }
      .navbar-list {
        justify-content: space-around !important;
        gap: 0 !important;
      }
      .navbar-link {
        font-size: 11px !important;
        padding: 6px 4px !important;
      }
    }
    
    .quote-box {
      background: rgba(255,219,112,0.05);
      border: 1px solid rgba(255,219,112,0.2);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .quote-en {
      font-size: 14px;
      color: #ffdb70;
      font-style: italic;
    }
    .quote-zh {
      font-size: 12px;
      color: #aaa;
      font-style: italic;
    }
    .export-pdf-btn {
      background: #2b2b2c;
      border: 1px solid #ffdb70;
      border-radius: 30px;
      color: #ffdb70;
      cursor: pointer;
      font-size: 13px;
      padding: 8px 20px;
      transition: all 0.3s ease;
    }
    .export-pdf-btn:hover {
      background: #ffdb70;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/favicon-96x96.png" alt="Kingsley Qi" width="80">
        </figure>
        <div class="info-content">

</p>

      <div class="sidebar-info_more">

        <ul class="contacts-list">
          <li class="contact-item">

            <div class="contact-info">
              <p class="contact-title">Phone</p>
              <a href="tel:+63960864508" class="contact-link">+63 960864508*</a>
            </div>
          </li>
          <li class="contact-item">
            <div class="icon-box"><ion-icon name="calendar-outline"></ion-icon></div>
            <div class="contact-info">

        <ul class="social-list">

          <li class="social-item"><a href="https://www.facebook.com/share/17jWndEeLo/" class="social-link"><ion-icon name="logo-facebook"></ion-icon></a></li>
          <li class="social-item"><a href="https://x.com/QiKingsley" class="social-link"><ion-icon name="logo-twitter"></ion-icon></a></li>
          <li class="social-item"><a href="https://www.instagram.com/kingsley_qi" class="social-link"><ion-icon name="logo-instagram"></ion-icon></a></li>
        </ul>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item"><button class="navbar-link active" data-nav-link="about">About</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="path">Path</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="network">Network</button></li>
          <li class="navbar-item"><button class="navbar-link" data-nav-link="systems">Systems</button></li>

      </nav>

      <article class="about active" data-page="about" id="about-container"><div class="loading-tip">加载中...</div></article>
      <article class="Path" data-page="path" id="path-container"><div class="loading-tip">加载中...</div></article>
      <article class="network" data-page="network" id="network-container"><div class="loading-tip">加载中...</div></article>
      <article class="Systems" data-page="systems" id="systems-container"><div class="loading-tip">加载中...</div></article>
      <article class="contact" data-page="contact" id="contact-container"><div class="loading-tip">加载中...</div></article>
    </div>
  </main>

  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <script>
    // 侧边栏折叠
    (function() {
      const sidebarBtn = document.querySelector("[data-sidebar-btn]");
      const sidebar = document.querySelector("[data-sidebar]");
      if (sidebarBtn && sidebar) {
        sidebarBtn.addEventListener("click", function(e) {
          e.stopPropagation();
          sidebar.classList.toggle("active");
          const span = this.querySelector('span');
          span.textContent = sidebar.classList.contains('active') ? '收起联系方式' : '展开联系方式';
        });
      }
    })();
    
    // 等待 marked 加载完成
    const waitForMarked = setInterval(() => {
      if (typeof marked !== 'undefined') {
        clearInterval(waitForMarked);
        console.log('marked.js 加载完成');
        // 加载 script.js
        const script = document.createElement('script');
        script.src = './assets/js/script.js';
        document.body.appendChild(script);
      }
    }, 100);
    
    // 5秒超时，如果 marked 还没加载，显示错误提示
    setTimeout(() => {
      if (typeof marked === 'undefined') {
        clearInterval(waitForMarked);
        document.querySelectorAll('.loading-tip').forEach(el => {
          el.innerHTML = '⚠️ 资源加载超时，请刷新页面重试<br><small>如持续失败，请检查网络连接</small>';
          el.style.color = '#ff6b6b';
        });
      }
    }, 8000);
  </script>
</body>
</html>
