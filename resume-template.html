<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kingsley Qi Resume</title>

<style>
  body {
    font-family: Arial, sans-serif;
    color: #333;
    padding: 40px;
    line-height: 1.6;
  }

  .header {
    border-bottom: 2px solid #ffdb70;
    padding-bottom: 15px;
    margin-bottom: 25px;
  }

  .name {
    font-size: 28px;
    font-weight: bold;
  }

  .title {
    color: #d69e2e;
    font-weight: bold;
    margin-top: 5px;
  }

  .contact {
    font-size: 12px;
    margin-top: 10px;
  }

  .section {
    margin-bottom: 25px;
    page-break-inside: avoid;
  }

  .section h2 {
    font-size: 18px;
    border-left: 4px solid #ffdb70;
    padding-left: 8px;
    margin-bottom: 10px;
  }

  .item {
    margin-bottom: 8px;
  }

  .footer {
    margin-top: 40px;
    font-size: 10px;
    text-align: center;
    color: #aaa;
  }
</style>
</head>

<body>

<div class="header">
  <div class="name" id="name"></div>
  <div class="title" id="title"></div>
  <div class="contact" id="contact"></div>
</div>

<div class="section">
  <h2>About</h2>
  <div id="about"></div>
</div>

<div class="section">
  <h2>Experience</h2>
  <div id="timeline"></div>
</div>

<div class="section">
  <h2>Skills</h2>
  <div id="skills"></div>
</div>

<div class="footer">
  Kingsley Qi | Digital Portfolio | 2026
</div>

</body>
</html>
